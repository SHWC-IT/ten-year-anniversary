<!DOCTYPE html>
<html lang="en" data-base="dark" data-accent="navy" data-display="cinzel" data-script="gvibes">
<head>
<meta charset="UTF-8" />
<script>
  /* Break out of the Elvanto registration iframe to the full top-level page.
     When Elvanto redirects the iframe here after submission, this page is
     same-origin with the parent (production), so it can promote itself to the
     top window. Runs only when framed, so it is a no-op as a standalone page
     (no loop). If it can't run, the layout below still fits inside the iframe. */
  if (window.top !== window.self) {
    window.top.location.replace('/register-complete');
  }
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Registration Complete · Shepherd's House Worship Center</title>
<link rel="icon" type="image/png" href="uploads/shwc-anniversary-logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Italiana&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Great+Vibes&family=Pinyon+Script&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shwc.css" />
<style>
  /* Confirmation page — lives INSIDE the Elvanto iframe. It must always fit the
     iframe's box with no scrolling, so everything is sized against the available
     height (vh-based clamps), vertically centered, and overflow is clipped. As
     vertical room runs out, the least-important pieces drop in order:
     store thumbnails first, then the card descriptions. */
  html, body { height: 100%; }
  body { margin: 0; background: #f1ebdb; overflow: hidden; }

  .rc {
    box-sizing: border-box; height: 100%;
    max-width: 940px; margin: 0 auto;
    padding: clamp(12px, 3.2vh, 30px) clamp(16px, 4vw, 40px);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; gap: clamp(8px, 1.8vh, 16px);
  }

  /* success header */
  .rc-badge {
    width: clamp(40px, 8vh, 58px); aspect-ratio: 1; border-radius: 50%; flex: none;
    display: grid; place-items: center; color: var(--on-accent);
    background: linear-gradient(165deg, var(--gold-hi) 0%, var(--accent) 45%, var(--accent-2) 140%);
    box-shadow: 0 14px 32px -14px color-mix(in oklab, var(--accent) 60%, transparent);
  }
  .rc-badge svg { width: 58%; height: 58%; }
  .rc-title {
    margin: 0; font-family: var(--display); font-weight: 600; text-transform: uppercase;
    font-size: clamp(1.5rem, 5vh, 2.5rem); line-height: 1.14; letter-spacing: .03em; color: #1d1812;
  }
  .rc-title em {
    font-family: var(--script); font-style: normal; font-weight: 400;
    text-transform: none; color: #8a6526; letter-spacing: 0; font-size: 1.18em; line-height: 1;
  }
  .rc-meta {
    margin: 0; font-family: var(--label); font-weight: 700;
    font-size: clamp(.54rem, 1.5vh, .66rem); letter-spacing: .24em; text-transform: uppercase; color: #8a6526;
  }

  /* CTA cards — side by side when wide, stacked when narrow */
  .rc-cards {
    width: 100%; display: grid; grid-template-columns: 1fr;
    gap: clamp(8px, 1.8vh, 14px); margin-top: clamp(2px, 1vh, 10px);
  }
  @media (min-width: 640px) { .rc-cards { grid-template-columns: 1fr 1fr; align-items: stretch; } }

  .rc-card {
    position: relative; background: #faf6ea;
    border: 1px solid color-mix(in oklab, var(--accent) 55%, transparent); border-radius: var(--radius);
    padding: clamp(12px, 2.6vh, 24px) clamp(14px, 3vw, 26px);
    display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
  }
  .rc-card::before {
    content: ""; position: absolute; inset: 6px; pointer-events: none;
    border: 1px solid color-mix(in oklab, var(--accent) 30%, transparent);
  }
  .rc-card > * { position: relative; }
  .rc-card .eyebrow { justify-content: center; color: #8a6526; }
  .rc-card h2 {
    font-family: var(--display); font-weight: 600; text-transform: uppercase;
    font-size: clamp(1.1rem, 2.8vh, 1.6rem); line-height: 1.12; letter-spacing: .04em; margin: clamp(4px, 1vh, 8px) 0 0; color: #1d1812;
  }
  .rc-card h2 em {
    font-family: var(--script); font-style: normal; font-weight: 400;
    text-transform: none; color: #8a6526; letter-spacing: 0; font-size: 1.2em;
  }
  .rc-card p { color: #6f6253; margin: clamp(4px, 1vh, 10px) auto 0; max-width: 36ch; font-size: clamp(.8rem, 1.6vh, .95rem); line-height: 1.4; }
  .rc-card .btn { margin-top: clamp(8px, 1.8vh, 18px); }

  /* store preview thumbnails */
  .rc-preview { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(6px, 1vw, 10px); margin: clamp(8px, 1.6vh, 16px) 0 0; width: 100%; }
  .rc-preview figure { margin: 0; }
  .rc-preview .ph {
    aspect-ratio: 1 / 1; background: #fffdf6; border: 1px solid rgba(29, 24, 18, .14);
    border-radius: var(--radius); overflow: hidden;
  }
  .rc-preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .rc-preview figcaption {
    margin-top: 6px; font-family: var(--label); font-weight: 700; font-size: clamp(.46rem, 1vh, .54rem);
    letter-spacing: .12em; text-transform: uppercase; color: #6f6253;
    display: flex; justify-content: space-between; gap: 6px;
  }
  .rc-preview figcaption b { color: #8a6526; font-weight: 700; }

  /* progressive trimming so the page never needs to scroll inside the iframe */
  @media (max-height: 620px) { .rc-preview { display: none; } }
  @media (max-height: 480px) {
    .rc-card p { display: none; }
    .rc-meta { letter-spacing: .18em; }
  }
  @media (max-height: 380px) {
    .rc-badge { display: none; }
  }
</style>
</head>
<body>

  <main class="rc">
    <span class="rc-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>
    </span>
    <h1 class="rc-title">You're <em>registered.</em></h1>
    <p class="rc-meta">We've saved your seat · October 9 - 11, 2026</p>

    <div class="rc-cards">

      <div class="rc-card">
        <p class="eyebrow">Giving</p>
        <h2>Sow into the next <em>decade.</em></h2>
        <p>Help establish the Prayer Tabernacle, a consecrated place of divine encounter for the years ahead.</p>
        <a class="btn" href="giving.html" target="_top">Give Now</a>
      </div>

      <div class="rc-card">
        <p class="eyebrow">Anniversary Store</p>
        <h2>Take home the <em>celebration.</em></h2>
        <div class="rc-preview">
          <figure>
            <div class="ph"><img src="uploads/merch-tee.webp" alt="10 Year Anniversary Tee" /></div>
            <figcaption><span>Tee</span><b>$25</b></figcaption>
          </figure>
          <figure>
            <div class="ph"><img src="uploads/merch-hat.webp" alt="10 Year Anniversary Hat" /></div>
            <figcaption><span>Hat</span><b>$20</b></figcaption>
          </figure>
          <figure>
            <div class="ph"><img src="uploads/merch-tote.webp" alt="Anniversary Tote Bag" /></div>
            <figcaption><span>Tote</span><b>$15</b></figcaption>
          </figure>
        </div>
        <a class="btn" href="https://shwc-store.square.site" target="_blank" rel="noopener">Shop the Collection<svg class="ext-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg></a>
      </div>

    </div>
  </main>

</body>
</html>
