<!DOCTYPE html>
<html lang="en" data-base="dark" data-accent="navy" data-display="cinzel" data-script="gvibes">
<head>
<meta charset="UTF-8" />
<script>
  /* Break out of the Elvanto registration iframe to the full top-level page.
     When Elvanto redirects the iframe here after submission, this page is
     same-origin with the parent, so it can promote itself to the top window.
     Runs only when framed, so it is a no-op as a standalone page (no loop). */
  if (window.top !== window.self) {
    window.top.location.replace('/register-complete');
  }
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Registration Complete · Shepherd's House Worship Center</title>
<link rel="icon" type="image/png" href="uploads/shwc-anniversary-logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Italiana&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Great+Vibes&family=Pinyon+Script&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shwc.css" />
<style>
  /* standalone confirmation page — designed to live inside the Elvanto iframe */
  html, body { background: #f1ebdb; }
  body { margin: 0; }
  .rc-wrap {
    max-width: 560px; margin: 0 auto;
    padding: clamp(18px, 4vw, 32px) clamp(18px, 5vw, 36px);
    display: flex; flex-direction: column; align-items: center; text-align: center;
  }

  /* success header */
  .rc-badge {
    width: 62px; height: 62px; border-radius: 50%; margin: 0 0 14px;
    display: grid; place-items: center; color: var(--on-accent);
    background: linear-gradient(165deg, var(--gold-hi) 0%, var(--accent) 45%, var(--accent-2) 140%);
    box-shadow: 0 14px 32px -14px color-mix(in oklab, var(--accent) 60%, transparent);
  }
  .rc-title {
    font-family: var(--display); font-weight: 600; text-transform: uppercase;
    font-size: clamp(1.8rem, 6vw, 2.6rem); line-height: 1.2; letter-spacing: .03em; margin: 0; color: #1d1812;
  }
  .rc-title em {
    font-family: var(--script); font-style: normal; font-weight: 400;
    text-transform: none; color: #8a6526; letter-spacing: 0; font-size: 1.18em; line-height: 1;
  }
  .rc-meta {
    font-family: var(--label); font-weight: 700; font-size: .66rem;
    letter-spacing: .26em; text-transform: uppercase; color: #8a6526; margin: 40px 0 26px;
  }

  /* stacked CTA cards */
  .rc-cards { display: flex; flex-direction: column; gap: 14px; width: 100%; }
  .rc-card {
    position: relative; background: #faf6ea;
    border: 1px solid color-mix(in oklab, var(--accent) 55%, transparent); border-radius: var(--radius);
    padding: clamp(18px, 4vw, 26px) clamp(18px, 4vw, 28px); text-align: center;
  }
  .rc-card::before {
    content: ""; position: absolute; inset: 6px; pointer-events: none;
    border: 1px solid color-mix(in oklab, var(--accent) 30%, transparent);
  }
  .rc-card > * { position: relative; }
  .rc-card .eyebrow { justify-content: center; color: #8a6526; }
  .rc-card h2 {
    font-family: var(--display); font-weight: 600; text-transform: uppercase;
    font-size: clamp(1.3rem, 4.5vw, 1.7rem); line-height: 1.14; letter-spacing: .04em; margin: 8px 0 0; color: #1d1812;
  }
  .rc-card h2 em {
    font-family: var(--script); font-style: normal; font-weight: 400;
    text-transform: none; color: #8a6526; letter-spacing: 0; font-size: 1.2em;
  }
  .rc-card p { color: #6f6253; margin: 10px auto 0; max-width: 40ch; font-size: .95rem; }
  .rc-card .btn { margin-top: 18px; }

  /* store preview thumbnails */
  .rc-preview { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 16px 0 0; }
  .rc-preview figure { margin: 0; }
  .rc-preview .ph {
    aspect-ratio: 1 / 1; background: #fffdf6; border: 1px solid rgba(29, 24, 18, .14);
    border-radius: var(--radius); overflow: hidden;
  }
  .rc-preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .rc-preview figcaption {
    margin-top: 8px; font-family: var(--label); font-weight: 700; font-size: .54rem;
    letter-spacing: .14em; text-transform: uppercase; color: #6f6253;
    display: flex; justify-content: space-between; gap: 6px;
  }
  .rc-preview figcaption b { color: #8a6526; font-weight: 700; }

  /* mobile polish */
  @media (max-width: 480px) {
    .rc-wrap { padding: 22px 16px 28px; }
    .rc-title { font-size: clamp(1.7rem, 8.5vw, 2.2rem); }
    .rc-meta { margin: 34px 0 22px; }
    .rc-card { padding: 22px 18px; }
    .rc-card p { font-size: .92rem; }
    .rc-card .btn { width: 100%; padding-inline: 1em; letter-spacing: .16em; font-size: .68rem; }
    .rc-preview { gap: 8px; }
    .rc-preview figcaption { font-size: .5rem; letter-spacing: .08em; }
  }
</style>
</head>
<body>

  <div class="rc-wrap">
    <span class="rc-badge">
      <svg viewBox="0 0 24 24" width="38" height="38" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
    </span>
    <h1 class="rc-title">You're <em>registered.</em></h1>
    <p class="rc-meta">We've saved your seat · October 9 - 11, 2026</p>

    <div class="rc-cards">

      <div class="rc-card">
        <p class="eyebrow">Giving</p>
        <h2>Sow into the next <em>decade.</em></h2>
        <p>Help establish the Prayer Tabernacle, a consecrated place of divine encounter for the years ahead.</p>
        <a class="btn" href="giving.html" target="_top">Give Now</a>
      </div>

      <div class="rc-card">
        <p class="eyebrow">Anniversary Store</p>
        <h2>Take home the <em>celebration.</em></h2>
        <div class="rc-preview">
          <figure>
            <div class="ph"><img src="uploads/merch-tee.webp" alt="10 Year Anniversary Tee" /></div>
            <figcaption><span>Tee</span><b>$25</b></figcaption>
          </figure>
          <figure>
            <div class="ph"><img src="uploads/merch-hat.webp" alt="10 Year Anniversary Hat" /></div>
            <figcaption><span>Hat</span><b>$20</b></figcaption>
          </figure>
          <figure>
            <div class="ph"><img src="uploads/merch-tote.webp" alt="Anniversary Tote Bag" /></div>
            <figcaption><span>Tote</span><b>$15</b></figcaption>
          </figure>
        </div>
        <a class="btn" href="https://shwc-store.square.site" target="_blank" rel="noopener">Shop the Collection<svg class="ext-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg></a>
      </div>

    </div>
  </div>

</body>
</html>
