<!-- @dsCard group="Colors" viewport="700x190" name="Navy Base Ramp" subtitle="Deep navy backgrounds & surfaces" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--font-body); padding: 22px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .sw { flex: 1 1 0; min-width: 96px; }
  .chip { height: 72px; border-radius: var(--radius); border: 1px solid var(--line-soft); }
  .nm { font-family: var(--font-label); font-weight: 700; font-size: .6rem; letter-spacing: .14em; text-transform: uppercase; margin-top: 9px; }
  .hex { font-family: var(--font-label); font-size: .62rem; color: var(--ink-soft); margin-top: 2px; letter-spacing: .04em; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--navy-900)"></div><div class="nm">navy-900</div><div class="hex">#0a0f1d · bg</div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-800)"></div><div class="nm">navy-800</div><div class="hex">#0e1526 · bg-2</div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-700)"></div><div class="nm">navy-700</div><div class="hex">#141c31 · surface</div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-600)"></div><div class="nm">navy-600</div><div class="hex">#1b2540</div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-500)"></div><div class="nm">navy-500</div><div class="hex">#34466e</div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-300)"></div><div class="nm">navy-300</div><div class="hex">#7d96c9</div></div>
  </div>
</body></html>
