<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--font-body); padding: 24px 28px; }
  .eyebrow { font-family: var(--font-label); font-weight: 700; font-size: .68rem; letter-spacing: .3em; text-transform: uppercase; color: var(--accent); display: inline-flex; align-items: center; gap: 1em; margin: 0 0 16px; }
  .eyebrow::before { content: ""; width: 30px; height: 1px; background: currentColor; }
  p.body { font-size: 1.02rem; line-height: 1.65; max-width: 54ch; margin: 0; color: var(--ink); }
  .meta { font-family: var(--font-label); font-size: .6rem; letter-spacing: .2em; text-transform: uppercase; color: var(--ink-soft); margin-top: 16px; }
</style></head>
<body>
  <p class="eyebrow">The Anniversary Program</p>
  <p class="body">Three nights of prayer, worship, and commissioning as we celebrate a decade of faith and look toward the next.</p>
  <p class="meta">Hanken Grotesk · labels 700 / .3em caps · body 400 / 1.65</p>
</body></html>
