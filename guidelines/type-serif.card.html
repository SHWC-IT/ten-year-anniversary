<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--font-body); padding: 24px 28px; }
  blockquote { margin: 0; font-family: var(--font-serif); font-weight: 500; font-style: italic; font-size: 1.7rem; line-height: 1.4; max-width: 34ch; padding-left: 18px; border-left: 2px solid var(--accent); }
  .meta { font-family: var(--font-label); font-size: .6rem; letter-spacing: .2em; text-transform: uppercase; color: var(--ink-soft); margin-top: 16px; }
</style></head>
<body>
  <blockquote>"Unless the Lord builds the house, the builders labor in vain."</blockquote>
  <p class="meta">Cormorant Garamond · 500 italic · gold rule accent</p>
</body></html>
