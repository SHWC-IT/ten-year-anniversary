<!-- @dsCard group="Type" viewport="700x220" name="Display · Cinzel" subtitle="Ceremonial caps — headings & numerals" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--font-body); padding: 26px 28px; }
  .big { font-family: var(--font-display); font-weight: var(--wt-display); text-transform: uppercase; font-size: 2.6rem; letter-spacing: var(--track-display); line-height: 1.06; margin: 0; }
  .med { font-family: var(--font-display); font-weight: var(--wt-display); text-transform: uppercase; font-size: 1.25rem; letter-spacing: .08em; margin: 16px 0 0; }
  .meta { font-family: var(--font-label); font-size: .6rem; letter-spacing: .2em; text-transform: uppercase; color: var(--ink-soft); margin-top: 14px; }
  em { font-family: var(--font-script); font-style: normal; text-transform: none; color: var(--accent); font-size: 1.2em; letter-spacing: 0; }
</style></head>
<body>
  <p class="big">A Decade of <em>Faith</em></p>
  <p class="med">Gathering of Nations</p>
  <p class="meta">Cinzel · 600 · uppercase · tracking .04em → .08em</p>
</body></html>
