<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--font-body); padding: 24px; display: flex; gap: 28px; align-items: center; }
  .logo { height: 170px; width: auto; filter: drop-shadow(0 14px 36px rgba(0,0,0,.5)); }
  .txt { max-width: 30ch; }
  .name { font-family: var(--font-display); font-weight: 600; text-transform: uppercase; letter-spacing: .14em; font-size: 1rem; line-height: 1.4; }
  .name small { display: block; font-family: var(--font-label); font-weight: 600; font-size: .58rem; letter-spacing: .3em; color: var(--ink-soft); }
  .meta { font-family: var(--font-label); font-size: .6rem; letter-spacing: .18em; text-transform: uppercase; color: var(--ink-soft); margin-top: 14px; line-height: 1.7; }
</style></head>
<body>
  <img class="logo" src="../assets/logo-anniversary.png" alt="SHWC 10th Anniversary" />
  <div class="txt">
    <div class="name">Shepherd's House<small>Worship Center</small></div>
    <div class="meta">10th Anniversary mark · gold on navy · clear space ≥ logo height ÷ 4</div>
  </div>
</body></html>
