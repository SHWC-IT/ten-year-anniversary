<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="8px base rhythm" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--font-body); padding: 24px 28px; }
  .row { display: flex; gap: 14px; align-items: flex-end; flex-wrap: wrap; }
  .u { text-align: center; }
  .bar { background: var(--grad-gold); border-radius: 1px; width: 26px; }
  .nm { font-family: var(--font-label); font-weight: 700; font-size: .55rem; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-soft); margin-top: 8px; }
</style></head>
<body>
  <div class="row">
    <div class="u"><div class="bar" style="height:4px"></div><div class="nm">1 · 4</div></div>
    <div class="u"><div class="bar" style="height:8px"></div><div class="nm">2 · 8</div></div>
    <div class="u"><div class="bar" style="height:12px"></div><div class="nm">3 · 12</div></div>
    <div class="u"><div class="bar" style="height:16px"></div><div class="nm">4 · 16</div></div>
    <div class="u"><div class="bar" style="height:24px"></div><div class="nm">5 · 24</div></div>
    <div class="u"><div class="bar" style="height:32px"></div><div class="nm">6 · 32</div></div>
    <div class="u"><div class="bar" style="height:48px"></div><div class="nm">7 · 48</div></div>
    <div class="u"><div class="bar" style="height:64px"></div><div class="nm">8 · 64</div></div>
  </div>
</body></html>
